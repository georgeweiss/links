body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 500px;
  background: radial-gradient(ellipse, rgba(41,151,255,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 460px;
  margin: 0 auto;
  padding: 60px 20px 80px;
  display: flex; flex-direction: column; align-items: center;
}

/* Avatar */
.av {
  position: relative;
  width: 92px; height: 92px;
  margin-bottom: 44px;
}
.av-ring {
  position: absolute; inset: -3px; border-radius: 50%;
  background: conic-gradient(from 0deg, #2997ff, #5e30ff, transparent 60%, #2997ff);
  animation: spin 5s linear infinite;
}
.av-ring::after {
  content: ''; position: absolute; inset: 3px;
  border-radius: 50%; background: #000;
}
.av-inner {
  position: absolute; inset: 3px; border-radius: 50%;
  background: linear-gradient(145deg, #0c1f40, #091628);
  display: flex; align-items: center; justify-content: center;
  font-size: 27px; font-weight: 500; color: rgba(255,255,255,0.8);
  z-index: 1; letter-spacing: 1px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Cards */
.links { width: 100%; display: flex; flex-direction: column; gap: 10px; }

.card {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px;
  text-decoration: none; color: #f5f5f7;
  position: relative; overflow: hidden;
  transition: background .2s, border-color .2s, transform .18s cubic-bezier(.22,1,.36,1), box-shadow .2s;
  -webkit-tap-highlight-color: transparent;
}
.card:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.17);
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(0,0,0,0.5), 0 0 0 .5px rgba(41,151,255,.2);
}
.card:active { transform: scale(.98); }

.ico {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 21px;
}
.i1 { background: linear-gradient(145deg,#0e2d55,#071a38); }
.i2 { background: linear-gradient(145deg,#0c3320,#061f12); }
.i3 { background: linear-gradient(145deg,#3c1010,#240a0a); }
.i4 { background: linear-gradient(145deg,#201040,#120826); }
.i5 { background: linear-gradient(145deg,#0e3424,#082014); }

.txt { flex: 1; }
.t1 { font-size: 15px; font-weight: 500; letter-spacing: -.1px; }
.t2 { font-size: 12px; color: rgba(245,245,247,.4); margin-top: 2px; }

.arr {
  width: 16px; height: 16px; flex-shrink: 0; position: relative; opacity: .22;
  transition: transform .18s, opacity .18s;
}
.arr::before, .arr::after {
  content: ''; position: absolute; right: 3px;
  width: 7px; height: 1.5px; background: #fff; border-radius: 2px;
}
.arr::before { top: 4px;  transform: rotate(45deg); }
.arr::after  { top: 9px; transform: rotate(-45deg); }
.card:hover .arr { transform: translateX(3px); opacity: .65; }

/* Entrance */
@keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.av    { animation: up .7s cubic-bezier(.22,1,.36,1) .05s both; }
.card:nth-child(1) { animation: up .55s cubic-bezier(.22,1,.36,1) .12s both; }
.card:nth-child(2) { animation: up .55s cubic-bezier(.22,1,.36,1) .19s both; }
.card:nth-child(3) { animation: up .55s cubic-bezier(.22,1,.36,1) .26s both; }
.card:nth-child(4) { animation: up .55s cubic-bezier(.22,1,.36,1) .33s both; }
.card:nth-child(5) { animation: up .55s cubic-bezier(.22,1,.36,1) .40s both; }
