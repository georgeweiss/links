:root {
  --bg: #000000;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text-primary: #f5f5f7;
  --text-secondary: rgba(245,245,247,0.5);
  --accent: #2997ff;
  --accent-glow: rgba(41,151,255,0.15);
  --radius: 18px;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(41,151,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(100,50,255,0.07) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Subtle noise texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 60px 24px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Avatar */
.avatar-wrap {
  position: relative;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}

.avatar {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  letter-spacing: -1px;
  position: relative;
  overflow: hidden;
}

.avatar::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(41,151,255,0.2) 0%, transparent 60%);
  border-radius: 50%;
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 0%, var(--accent) 30%, transparent 60%);
  animation: spin 4s linear infinite;
  opacity: 0.5;
}

.avatar-ring::before {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--bg);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Header text */
.header {
  text-align: center;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
}

.name {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(26px, 6vw, 32px);
  font-weight: 500;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.tagline {
  font-size: 15px;
  color: var(--text-secondary);
  font-weight: 300;
  letter-spacing: 0.2px;
}

/* Links grid */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.link-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-decoration: none;
  color: var(--text-primary);
  transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s ease;
  position: relative;
  overflow: hidden;
  opacity: 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
}

.link-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, rgba(41,151,255,0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.link-card:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px) scale(1.005);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(41,151,255,0.2);
}

.link-card:hover::before {
  opacity: 1;
}

.link-card:active {
  transform: translateY(0) scale(0.99);
}

/* Icon */
.icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}

/* Info */
.info {
  flex: 1;
  min-width: 0;
}

.link-title {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.1px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.link-desc {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 300;
  margin-top: 2px;
}

/* Arrow */
.arrow {
  color: rgba(255,255,255,0.2);
  font-size: 16px;
  transition: color 0.2s ease, transform 0.2s ease;
  flex-shrink: 0;
}

.link-card:hover .arrow {
  color: var(--accent);
  transform: translateX(3px);
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.link-card:nth-child(1)  { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.3s forwards; }
.link-card:nth-child(2)  { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.38s forwards; }
.link-card:nth-child(3)  { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.46s forwards; }
.link-card:nth-child(4)  { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.54s forwards; }
.link-card:nth-child(5)  { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.62s forwards; }
.link-card:nth-child(6)  { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.70s forwards; }
.link-card:nth-child(7)  { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.78s forwards; }

/* Footer */
.footer {
  margin-top: 48px;
  font-size: 12px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 0.5px;
  opacity: 0;
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
}

/* Ripple effect */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(41,151,255,0.15);
  transform: scale(0);
  animation: rippleAnim 0.6s linear;
  pointer-events: none;
}

@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* Icon backgrounds */
.icon-findphone  { background: linear-gradient(135deg, #1c3a5e, #0a2744); }
.icon-crypto     { background: linear-gradient(135deg, #1e3a1e, #0d2b0d); }
.icon-preco      { background: linear-gradient(135deg, #3a1c1c, #2b0d0d); }
.icon-regrade    { background: linear-gradient(135deg, #2a1a3e, #1a0d2b); }
.icon-calcmedia  { background: linear-gradient(135deg, #1e2a3a, #0d1a2b); }
.icon-dieta      { background: linear-gradient(135deg, #1e3a2a, #0d2b1a); }
.icon-links      { background: linear-gradient(135deg, #3a2a1e, #2b1a0d); }

@media (max-width: 420px) {
  .container { padding: 48px 16px 64px; }
}

  </div>

  <script>
    // Ripple effect on click
    document.querySelectorAll('.link-card').forEach(card => {
      card.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const size = Math.max(rect.width, rect.height);
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });
  </script>
